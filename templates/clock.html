<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            background: linear-gradient(45deg, #6a11cb, #2575fc);\n            color: white;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            font-family: Arial, sans-serif;\n            text-align: center;\n        }\n        .clock {\n            font-size: 2em;\n            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.3);\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div id="utc">UTC: --:--:--</div>\n        <div id="new-york">New York: --:--:--</div>\n        <div id="london">London: --:--:--</div>\n        <div id="tokyo">Tokyo: --:--:--</div>\n        <div id="sydney">Sydney: --:--:--</div>\n        <div id="dubai">Dubai: --:--:--</div>\n    </div>\n    <script>\n        function updateClock() {\n            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit' };\n            const utcDate = new Date();\n\n            document.getElementById('utc').innerText = 'UTC: ' + utcDate.toLocaleTimeString('en-US', options);\n            document.getElementById('new-york').innerText = 'New York: ' + utcDate.toLocaleTimeString('en-US', { timeZone: 'America/New_York', ...options });\n            document.getElementById('london').innerText = 'London: ' + utcDate.toLocaleTimeString('en-US', { timeZone: 'Europe/London', ...options });\n            document.getElementById('tokyo').innerText = 'Tokyo: ' + utcDate.toLocaleTimeString('en-US', { timeZone: 'Asia/Tokyo', ...options });\n            document.getElementById('sydney').innerText = 'Sydney: ' + utcDate.toLocaleTimeString('en-US', { timeZone: 'Australia/Sydney', ...options });\n            document.getElementById('dubai').innerText = 'Dubai: ' + utcDate.toLocaleTimeString('en-US', { timeZone: 'Asia/Dubai', ...options });\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>\n
